name: Claude Worker

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  push:
    branches: ['task/**']

jobs:
  claude-issue:
    if: github.event_name == 'issues' && github.event.label.name == 'ai-task'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: claude-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 1000"
          prompt: |
            Read this issue and implement it following CLAUDE.md and .claude/rules/.
            Work on a feature branch off main. Satisfy the DoD (run scripts/dod.sh
            if it exists). Open a PR that references the issue (Closes #N) and post
            a short summary comment on the issue in Russian.

      - name: Dead-run alarm (issue path)
        if: failure() || cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `⚠️ Исполнитель не завершил задачу (лимиты/сбой). Ссылка на запуск: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

  claude-task-push:
    # anthropics/claude-code-action@v1 does not support the `push` event
    # ("Unsupported event type: push"), so this job runs the Claude Code CLI
    # directly.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/task/')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: claude-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Trust the checkout directory
        # A fresh runner has no ~/.claude.json, so the CLI's first-run
        # workspace-trust dialog blocks every tool call. Pre-accept it.
        run: |
          python3 -c "
          import json, os
          path = os.path.expanduser('~/.claude.json')
          data = {}
          if os.path.exists(path):
              with open(path) as f:
                  data = json.load(f)
          data.setdefault('projects', {})['${{ github.workspace }}'] = {
              **data.get('projects', {}).get('${{ github.workspace }}', {}),
              'hasTrustDialogAccepted': True,
          }
          with open(path, 'w') as f:
              json.dump(data, f)
          "

      - name: Run Claude Code on the dispatched task
        # Claude Code treats .git as protected and always prompts on push,
        # even under --dangerously-skip-permissions. So Claude only commits
        # locally; push and PR creation happen in the next step, outside
        # Claude's sandbox.
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "This branch was created by the task dispatcher: its latest commit adds
          exactly one task prompt file under prompts/ (not in _done). Find it via
          \`git log -1 --name-only\`, read it, and execute it following CLAUDE.md and
          .claude/rules/. Use THIS branch as the working branch. Satisfy the DoD
          (run scripts/dod.sh if it exists). Move the prompt file to prompts/_done/
          in the same work. Commit your changes with git commit, following
          Conventional Commits. Do NOT run git push, do NOT create a PR, and do
          NOT ask for permission to do either — those steps happen automatically
          after you finish. End your turn once the commit is made." \
          --max-turns 1000 \
          --dangerously-skip-permissions

      - name: Push and open the PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git log origin/${{ github.ref_name }}..HEAD --oneline)" ]; then
            echo "No new commits from Claude — nothing to push." >&2
            exit 1
          fi
          git push origin HEAD:refs/heads/${{ github.ref_name }}
          TITLE=$(git log -1 --format=%s)
          gh pr create --base main --head "${{ github.ref_name }}" \
            --title "$TITLE" \
            --body "Opened automatically by the task-push worker from \`${{ github.ref_name }}\`."

      - name: DoD gate
        # PRs and merges made with GITHUB_TOKEN don't trigger other workflows
        # (GitHub anti-recursion), so the gate is computed right here.
        # Project-specific checks live in scripts/dod.sh; no dod.sh = gate
        # passes trivially (docs/prompts-only change).
        id: gate
        run: |
          if [ -f scripts/dod.sh ]; then
            if bash scripts/dod.sh; then
              echo "passed=true" >> "$GITHUB_OUTPUT"
            else
              echo "passed=false" >> "$GITHUB_OUTPUT"
              echo "failed=scripts/dod.sh" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "passed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-merge on green gate
        if: steps.gate.outputs.passed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ github.ref_name }}" --merge --delete-branch || \
            echo "::error::Auto-merge blocked (repo settings?) — see PR description for the owner." >&2

      - name: Report gate failure
        if: steps.gate.outputs.passed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.ref_name }}" --body "🔴 Проверки не прошли: ${{ steps.gate.outputs.failed }}"

      - name: Dead-run alarm (task push path)
        if: failure() || cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Worker failed: ${branch}`,
              body: `⚠️ Исполнитель не завершил задачу (лимиты/сбой).\n\nВетка: \`${branch}\`\nСсылка на запуск: ${runUrl}`,
              labels: ['worker-failure']
            });

  claude-comment:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 1000"

      - name: Dead-run alarm (comment path)
        if: failure() || cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue ? context.payload.issue.number : context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `⚠️ Исполнитель не завершил задачу (лимиты/сбой). Ссылка на запуск: ${runUrl}`
            });
