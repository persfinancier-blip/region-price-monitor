<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prizma — панель управления</title>
  <link rel="stylesheet" href="/static/panel.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">Prizma</div>
    <nav class="tabs">
      {% for tab in tabs %}
      <a class="tab {% if tab.key == active_tab %}tab--active{% endif %}" href="{{ tab.href }}">{{ tab.label }}</a>
      {% endfor %}
    </nav>
  </header>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/panel.js"></script>
</body>
</html>
