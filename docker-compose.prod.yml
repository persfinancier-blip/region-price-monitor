services:
  # Optional: only started with `--profile postgres` (or `docker compose --profile postgres up`).
  # Local mode (default, ADR-0009) needs no database at all — `app` runs standalone below.
  postgres:
    image: postgres:16
    profiles: ["postgres"]
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-region_price_monitor}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    env_file: .env
    volumes:
      - cookies:/srv/app/data/cookies
      - state:/srv/app/data/state
    command: ["serve"]
    restart: unless-stopped

  # Optional: the local web panel (Фаза 8.1, SPEC-panel.md). Local-only, no auth —
  # bind 127.0.0.1 on the host or put a reverse proxy with auth in front for server use.
  # panel:
  #   build: .
  #   env_file: .env
  #   volumes:
  #     - cookies:/srv/app/data/cookies
  #     - state:/srv/app/data/state
  #   command: ["panel", "--host", "0.0.0.0", "--port", "8000"]
  #   ports:
  #     - "127.0.0.1:8000:8000"
  #   restart: unless-stopped

volumes:
  pgdata:
  cookies:
  state:
